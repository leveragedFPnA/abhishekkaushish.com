<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Abhishek Kaushish</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font (premium feel) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d0d0d;
      color: #f5f5f5;
      font-family: 'Inter', sans-serif;
    }

    .container {
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-size: 42px;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .email {
      font-size: 16px;
      color: #a0a0a0;
      text-decoration: none;
      position: relative;
      transition: color 0.3s ease;
    }

    .email::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0%;
      height: 1px;
      background: #f5f5f5;
      transition: width 0.3s ease;
    }

    .email:hover {
      color: #ffffff;
    }

    .email:hover::after {
      width: 100%;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Subtle grain overlay for premium texture */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.04;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Abhishek Kaushish</h1>
    <a class="email" href="mailto:abhishek@abhishekkaushish.com">
      abhishek@abhishekkaushish.com
    </a>
  </div>
</body>
</html>
